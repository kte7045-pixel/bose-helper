<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>BOSE 도우미</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root {
 --bg: #fff;
 --bg2: #f5f5f5;
 --bg3: #ebebeb;
 --text: #1a1a1a;
 --text2: #555;
 --text3: #999;
 --border: #e0e0e0;
 --border2: #c8c8c8;
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html, body { height:100%; background:var(--bg); color:var(--text); font-family:'Noto Sans KR',sans-serif; overflow:hidden; }

/* ── 앱 ── */
#app { max-width:480px; margin:0 auto; height:100vh; display:flex; flex-direction:column; }

/* ── 헤더 ── */
.hdr {
 flex-shrink:0; height:52px; background:#000;
 display:flex; align-items:center; justify-content:space-between;
 padding:0 20px; position:sticky; top:0; z-index:100;
}
.hdr-logo { font-family:'Bebas Neue',sans-serif; font-size:22px; letter-spacing:5px; color:#fff; }
.hdr-logo span { font-size:12px; font-family:'Noto Sans KR',sans-serif; font-weight:300; letter-spacing:1px; color:rgba(255,255,255,.45); margin-left:6px; }
.hdr-right { display:flex; align-items:center; gap:10px; }
.hdr-reset {
 font-size:9px; color:rgba(255,255,255,.4); padding:2px 7px;
 border:1px solid rgba(255,255,255,.2); border-radius:2px;
 background:none; cursor:pointer; font-family:'Noto Sans KR',sans-serif;
 letter-spacing:1.5px; text-transform:uppercase; transition:all .15s;
}
.hdr-reset:hover { color:#fff; border-color:rgba(255,255,255,.6); }

/* ── 채팅 본문 ── */
.chat-body {
 flex:1; overflow-y:auto; background:var(--bg);
 display:flex; flex-direction:column;
 scroll-behavior:smooth;
}
.chat-body::-webkit-scrollbar { width:0; }

/* ── 시작 화면 ── */
.start-screen {
 flex:1; display:flex; flex-direction:column;
 align-items:center; justify-content:center;
 padding:40px 24px; gap:0;
 animation:ssFade .3s ease;
}
@keyframes ssFade { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
.ss-logo { font-family:'Bebas Neue',sans-serif; font-size:56px; letter-spacing:12px; color:var(--text); line-height:1; }
.ss-tagline { font-size:10px; color:var(--text3); letter-spacing:3px; text-transform:uppercase; margin-top:6px; margin-bottom:36px; }
.ss-question { font-size:16px; font-weight:700; color:var(--text); margin-bottom:24px; letter-spacing:-.3px; }
.ss-btns { display:flex; flex-direction:column; gap:8px; width:100%; max-width:280px; }
.ss-btn {
 padding:14px 20px; font-size:13px; font-weight:700;
 cursor:pointer; border:none; font-family:'Noto Sans KR',sans-serif;
 text-align:center; transition:opacity .15s; border-radius:2px;
 display:flex; align-items:center; justify-content:center; gap:8px;
}
.ss-btn.primary { background:var(--text); color:#fff; }
.ss-btn.primary:active { opacity:.75; }
.ss-btn.secondary { background:var(--bg); color:var(--text); border:1px solid var(--border2); font-weight:400; }
.ss-btn.secondary:active { background:var(--bg2); }

/* ── 메시지 행 ── */
.msg-row { display:flex; gap:10px; align-items:flex-end; padding:0 16px; margin-top:12px; }
.msg-row.user { flex-direction:row-reverse; }
.msg-row:first-child { margin-top:16px; }

.avatar {
 width:28px; height:28px; background:#000; border-radius:50%;
 display:flex; align-items:center; justify-content:center; flex-shrink:0;
 font-family:'Bebas Neue',sans-serif; font-size:12px; letter-spacing:1px; color:#fff;
}

.bubble { max-width:80%; font-size:13px; line-height:1.7; }
.bubble.bot {
 background:var(--bg2); color:var(--text);
 padding:11px 14px; border-radius:2px; border-radius:0 12px 12px 12px;
}
.bubble.user {
 background:var(--text); color:#fff;
 padding:11px 14px; border-radius:12px 12px 0 12px; font-weight:400;
}
.bubble b { font-weight:700; }

/* 스텝 카드 */
.sc {
 display:block; margin-top:8px; padding:10px 12px;
 background:#fff; border-bottom:1px solid var(--border);
 border-left:2px solid var(--text); font-size:12px; line-height:1.65;
}
.sc .sn { font-size:9px; color:var(--text3); letter-spacing:2px; text-transform:uppercase; margin-bottom:3px; font-weight:400; }
.sc .st { font-weight:700; margin-bottom:3px; color:var(--text); font-size:13px; }
.sc .sd { color:var(--text2); font-weight:300; }
.sc .gh { color:var(--text); font-weight:500; }
.sc .gw { color:#8a5500; font-weight:500; }

/* 경고 박스 */
.wn {
 display:block; margin-top:8px; padding:11px 13px;
 background:#fffbf0; border:1px solid #e8d090;
 border-radius:2px; font-size:12px; color:#6b4d00; line-height:1.65;
}

/* 정보 박스 */
.ib {
 display:block; margin-top:8px; padding:11px 13px;
 background:var(--bg2); border:1px solid var(--border);
 border-radius:2px; font-size:12px; color:var(--text2); line-height:1.7;
}
.ib .it { font-size:12px; font-weight:700; color:var(--text); margin-bottom:6px; }
.ib .iw { margin-top:7px; padding:7px 9px; background:#fff8e1; border:1px solid #e8d090; border-radius:2px; color:#7a5200; font-size:11.5px; line-height:1.6; }

/* 단종 배너 */
.disc-b {
 display:block; margin-top:8px; padding:9px 11px;
 background:#fff8f8; border:1px solid #f5c0c0;
 border-radius:2px; font-size:11.5px; color:#8b2020; line-height:1.6;
}

/* ── 타이핑 ── */
.typing-row { display:flex; gap:10px; align-items:flex-end; padding:0 16px; margin-top:12px; }
.typing-dots {
 display:flex; align-items:center; gap:4px; padding:11px 14px;
 background:var(--bg2); border-radius:0 12px 12px 12px; width:fit-content;
}
.typing-dots span { width:5px; height:5px; background:var(--border2); border-radius:50%; animation:td 1.2s infinite; }
.typing-dots span:nth-child(2) { animation-delay:.2s; }
.typing-dots span:nth-child(3) { animation-delay:.4s; }
@keyframes td { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-5px)} }

/* ── 칩 ── */
.chips { display:flex; flex-wrap:wrap; gap:6px; padding:8px 16px 0 54px; }
.chip {
 background:var(--bg2); border:1px solid var(--border); color:var(--text2);
 padding:6px 14px; border-radius:20px; font-size:12px; font-weight:400;
 cursor:pointer; white-space:nowrap; font-family:'Noto Sans KR',sans-serif;
 transition:all .13s;
}
.chip:hover, .chip:active { background:var(--text); color:#fff; border-color:var(--text); font-weight:500; }
.chip.call { background:var(--text); color:#fff; border-color:var(--text); font-weight:700; }
.chip.photo { border-color:var(--text); color:var(--text); font-weight:500; }

/* 이미지 */
.img-bub { max-width:200px; border-radius:8px; margin-top:5px; display:block; }

/* ── 제품 카드 그리드 ── */
.prod-grid {
  display:grid; grid-template-columns:1fr 1fr;
  gap:10px; padding:6px 16px 2px 16px; width:100%;
}
.prod-card {
  background:#fff; border:1px solid var(--border);
  border-radius:8px; padding:12px 10px 10px;
  cursor:pointer; transition:all .15s;
  display:flex; flex-direction:column; align-items:center; gap:6px;
  text-align:center;
}
.prod-card:hover, .prod-card:active { border-color:var(--text); background:var(--bg2); }
.prod-card.disc { opacity:.65; }
.prod-card-img { font-size:32px; line-height:1; }
.prod-card-name { font-size:11.5px; font-weight:700; color:var(--text); line-height:1.4; }
.prod-card-sub { font-size:10px; color:var(--text3); line-height:1.3; font-weight:400; }
.prod-card-badge {
  font-size:9px; background:var(--text3); color:#fff;
  padding:2px 6px; border-radius:2px; letter-spacing:.5px;
}

/* ── 입력창 ── */
.input-bar {
 flex-shrink:0; padding:10px 16px 20px;
 background:rgba(255,255,255,.97); backdrop-filter:blur(10px);
 border-top:1px solid var(--border);
 display:flex; gap:8px; align-items:flex-end;
}
.input-wrap {
 flex:1; background:var(--bg2); border-radius:2px;
 display:flex; align-items:center; padding:0 14px;
 min-height:42px; border:1px solid var(--border);
}
.txt-input {
 flex:1; background:transparent; border:none; outline:none;
 color:var(--text); font-size:13px; padding:10px 0;
 resize:none; max-height:90px; overflow-y:auto; font-family:'Noto Sans KR',sans-serif;
}
.txt-input::placeholder { color:var(--text3); }
.send-btn {
 width:42px; height:42px; background:var(--text); border:none;
 border-radius:2px; cursor:pointer; display:flex;
 align-items:center; justify-content:center; flex-shrink:0; transition:opacity .15s;
}
.send-btn:active { opacity:.7; }
.send-btn svg { width:15px; height:15px; }


/* ── 제품 카드 그리드 ── */
.product-grid {
  display:grid; grid-template-columns:1fr 1fr;
  gap:8px; padding:8px 16px 4px 16px;
  width:100%;
}
.product-card {
  background:#fff; border:1px solid var(--border);
  border-radius:8px; padding:12px 10px 10px;
  cursor:pointer; transition:all .15s;
  display:flex; flex-direction:column; align-items:center; gap:6px;
  text-align:center;
}
.product-card:hover, .product-card:active {
  border-color:var(--text); background:var(--bg2);
}
.product-card.discontinued { opacity:.65; }
.product-card-icon { font-size:28px; line-height:1; }
.product-card-name {
  font-size:11.5px; font-weight:700; color:var(--text);
  line-height:1.35; word-break:keep-all;
}
.product-card-sub {
  font-size:10px; color:var(--text3); line-height:1.4;
  word-break:keep-all;
}
.product-card-badge {
  font-size:9px; color:#8b2020; background:#fff0f0;
  border:1px solid #f5c0c0; border-radius:3px;
  padding:1px 5px; font-weight:700; letter-spacing:.5px;
}

/* 페이드인 */
.fin { animation:fup .2s ease forwards; opacity:0; transform:translateY(4px); }
@keyframes fup { to { opacity:1; transform:translateY(0); } }

#photoInput { display:none; }
</style>
</head>

<div id="app">

 <!-- 헤더 -->
 <div class="hdr">
 <div class="hdr-logo">BO<span>SE</span></div>
 <div class="hdr-right">
 <div class="hdr-status">
 <div class="hdr-dot"></div>
 <span class="hdr-txt">온라인</span>
 </div>
 <button class="hdr-reset" onclick="doReset()">처음으로</button>
 </div>
 </div>

 <!-- 채팅 본문 -->
 <div class="chat-body" id="chatBody"></div>

 <!-- 입력창 -->
 <div class="input-bar" id="inputBar">
 <div class="input-wrap">
 <textarea class="txt-input" id="txtInput"
 placeholder="증상이나 제품명을 입력하세요..."
 rows="1" onkeydown="onKey(event)" oninput="autoResize(this)"></textarea>
 </div>
 <button class="send-btn" onclick="onSend()">
 <svg viewBox="0 0 24 24" fill="none" stroke="#000" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
 <line x1="22" y1="2" x2="11" y2="13"/>
 <polygon points="22 2 15 22 11 13 2 9 22 2"/>
 </svg>
 </button>
 </div>

</div>
<input type="file" id="photoInput" accept="image/*" capture="environment" onchange="onPhoto(event)">

 });

// UI 유틸
// ════════════════════════════════════════════════════
const body = () => document.getElementById('chatBody');

function scrollBot() {
 const el = body();
 setTimeout(() => el.scrollTop = el.scrollHeight, 80);
}

function addMsg(html, type='bot', delay=0) {
 return new Promise(r => setTimeout(() => {
 const el = body();
 const row = document.createElement('div');
 row.className = 'msg-row ' + type + ' fin';
 if (type === 'bot') {
 row.innerHTML = '<div class="avatar">B</div><div class="bubble bot">' + html + '</div>';
 } else {
 row.innerHTML = '<div class="bubble user">' + html + '</div>';
 }
 el.appendChild(row); scrollBot(); r();
 }, delay));
}

function addChips(chips, delay=0) {
 return new Promise(r => setTimeout(() => {
 const el = body();
 const row = document.createElement('div');
 row.className = 'chips fin';
 row.innerHTML = chips.map(c =>
 '<button class="chip '+(c.cls||'')+'" onclick="'+c.fn+'">'+c.label+'</button>'
 ).join('');
 el.appendChild(row); scrollBot(); r();
 }, delay));
}

function typing(ms=700) {
 return new Promise(r => {
 const el = body();
 const row = document.createElement('div');
 row.className = 'typing-row fin'; row.id = 'tyRow';
 row.innerHTML = '<div class="avatar">B</div><div class="typing-dots"><span></span><span></span><span></span></div>';
 el.appendChild(row); scrollBot();
 setTimeout(() => { const t = document.getElementById('tyRow'); if(t)t.remove(); r(); }, ms);
 });
}

function rmChips() { body().querySelectorAll('.chips').forEach(e => e.remove()); }

function findManualAnswer(txt) {
  const lo = txt.toLowerCase();
  // QC Ultra 2세대 언급 여부 — 언급 없어도 일반 질문이면 답변
  const isQcUltra2 = lo.includes('ultra 2') || lo.includes('울트라 2') || lo.includes('2세대') || lo.includes('qcutra2');
  for (const [key, item] of Object.entries(QC_ULTRA2_MANUAL)) {
    if (item.keywords.some(k => lo.includes(k))) {
      return item;
    }
  }
  return null;
}

async function showMenu(menuId) {
  rmChips();
  const menu = BOSE_DATA.menus[menuId];
  if (!menu) return;
  const catLabels = { 'screen-headphone':'헤드폰', 'screen-earbud':'이어버드', 'screen-speaker':'스피커', 'screen-soundbar':'홈시어터', 'screen-homeaudio':'홈오디오' };
  await addMsg(catLabels[menuId]||menu.title, 'user');
  await typing(400);
  await addMsg('제품을 선택해 주세요!');
  await addProductGrid(menu, 'pickProduct', menuId);
}

function addProductGrid(menu, fnPrefix, menuId, delay=200) {
  return new Promise(r => setTimeout(() => {
    const iconMap = {
      'screen-headphone':'🎧','screen-earbud':'🎵',
      'screen-speaker':'🔊','screen-soundbar':'📺','screen-homeaudio':'🎼'
    };
    if (!menuId) menuId = Object.keys(BOSE_DATA.menus).find(k => BOSE_DATA.menus[k] === menu) || '';
    const catIcon = iconMap[menuId] || '🎵';
    const el = body();
    const grid = document.createElement('div');
    grid.className = 'product-grid fin';
    menu.items.forEach(i => {
      const card = document.createElement('div');
      card.className = 'product-card' + (i.discontinued ? ' discontinued' : '');
      const fn = fnPrefix === 'pickProduct'
        ? "pickProduct('" + i.title.replace(/'/g,"\'") + "','" + i.screen + "','" + menu.cat + "'," + !!i.discontinued + ")"
        : "btPickProduct('" + i.title.replace(/'/g,"\'") + "','" + i.screen + "','" + menu.cat + "'," + !!i.discontinued + ")";
      card.setAttribute('onclick', fn);
      card.innerHTML =
        '<div class="product-card-icon">' + catIcon + '</div>' +
        (i.discontinued ? '<span class="product-card-badge">단종</span>' : '') +
        '<div class="product-card-name">' + i.title + '</div>' +
        '<div class="product-card-sub">' + (i.sub||'') + '</div>';
      grid.appendChild(card);
    });
    el.appendChild(grid);
    scrollBot();
    r();
  }, delay));
}

async function pickSymptom(sym) {
  rmChips();
  S.symptom = sym;
  await addMsg(sym, 'user');
  await typing(500);

  // 제품이 이미 선택된 상태면 바로 초기화로
  if (S.productKey && BOSE_DATA.guides[S.productKey]) {
    await addMsg('알겠어요. 공장 초기화를 먼저 시도해 보세요!');
    await showReset();
    return;
  }

  // 제품 미선택 → 제품 선택 안내
  await addMsg('제품명을 알고 계신가요?');
  await addChips([
    { label:'알아요 — 직접 선택', fn:"startChat('list')" },
    { label:'모르겠어요',         fn:"guideToFind()" },
  ], 200);
}

async function pickProduct(title, screen, cat, disc) {
  rmChips();

  await addMsg(title, 'user');
  await typing(500);

  let html = '<b>' + title + '</b>';
  if (disc) html += '<span class="disc-b"> 단종 제품입니다. 완제품 구조로 부분 수리가 어렵고 지원이 제한될 수 있어요.</span>';
  await addMsg(html);
  await typing(400);
  await addMsg('어떤 문제가 있으신가요?');

    { label:'← 다시 선택',               fn:"startChat('list')" },
  ], 200);
}

async function showReset() {
 rmChips();
 const guide = BOSE_DATA.guides[S.productKey];
 if (!guide || !guide.reset) {
 await addMsg('해당 제품 가이드를 찾지 못했어요. 고객센터로 문의해 주세요.');
 return;
 }
 const r = guide.reset;
 await typing(700);
 let html = '<b>' + guide.tag + ' — ' + r.title + '</b><br><br>';
 r.steps.forEach(s => {
 html += '<span class="sc"><span class="sn">'+s.num+'</span><span class="st">'+s.title+'</span><span class="sd">'+s.desc+'</span></span>';
 });
 if (r.warning) html += '<span class="wn"> ' + r.warning + '</span>';
 await addMsg(html);
 await addChips([
 { label:'초기화 성공했어요', fn:'afterSuccess()' },
 { label:'아직도 같은 증상',  fn:'afterFail()' },
 ], 300);
}

async function analyzePhoto(b64) {
 try {
 const base64 = b64.split(',')[1];
 const mtype = b64.split(';')[0].split(':')[1];
 const plist = Object.keys(PMAP).join(', ');
 const resp = await fetch('https://api.anthropic.com/v1/messages', {
 method:'POST',
 headers:{'Content-Type':'application/json'},
 body: JSON.stringify({
 model:'claude-sonnet-4-20250514', max_tokens:300,
 messages:[{ role:'user', content:[
 { type:'image', source:{ type:'base64', media_type:mtype, data:base64 } },
 { type:'text', text:'이 BOSE 제품을 다음 목록에서 찾아 JSON으로만 답해주세요:\n'+plist+'\n\n{"found":true,"model":"목록의 정확한 제품명"} 또는 {"found":false}' }
 ]}]
 })
 });
 const data = await resp.json();
 const txt = (data.content||[]).map(i=>i.text||'').join('').replace(/```json|```/g,'').trim();
 let result;
 try { result = JSON.parse(txt); } catch(e) { result = {found:false}; }

 if (result.found && result.model) {
 const matched = Object.keys(PMAP).find(k =>
 k.toLowerCase() === result.model.toLowerCase() ||
 k.toLowerCase().includes(result.model.toLowerCase()) ||
 result.model.toLowerCase().includes(k.toLowerCase().split(' ').slice(0,2).join(' '))
 );
 if (matched) {
 const p = PMAP[matched];
 await addMsg('제품을 찾았어요! <br><b>'+matched+'</b> 맞나요?');
 await addChips([
 { label:' 맞아요', fn:"pickProduct('"+matched.replace(/'/g,"\\'")+"','"+p.screen+"','"+p.cat+"',"+p.discontinued+")" },
 { label:' 아니에요', fn:"startChat('list')" },
 ], 200);
 return;
 }
 }
 await addMsg('앗, 제품을 정확히 인식하지 못했어요 <br>다시 찍어보시거나, 아래에서 직접 선택해 주세요!');
 await addChips([
 { label:' 다시 찍기', fn:"document.getElementById('photoInput').click()", cls:'photo' },
 { label:' 목록에서 찾기', fn:"startChat('list')" },
 ], 200);
 } catch(err) {
 await addMsg('분석 중 오류가 발생했어요. 직접 선택해 주세요.');
 startChat('list');
 }
}

}
